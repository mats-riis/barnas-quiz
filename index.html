<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barnas quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Nunito", "Segoe UI", sans-serif;
      background: linear-gradient(-45deg, #1a0533, #0f3460, #16213e, #0f0c29);
      background-size: 400% 400%;
      animation: gradBG 20s ease infinite;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 16px; overflow-x: hidden;
    }
    @keyframes gradBG {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle { position: absolute; animation: floatUp linear infinite; user-select: none; opacity: 0; }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.18; }
      90%  { opacity: 0.18; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .splash-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; padding: 32px; transition: opacity 0.5s, transform 0.5s;
    }
    .splash-screen.hidden { opacity: 0; transform: scale(1.04); pointer-events: none; }
    .mascot { font-size: 7rem; animation: mascotBounce 2.5s ease-in-out infinite; filter: drop-shadow(0 8px 24px rgba(255,209,102,.45)); }
    @keyframes mascotBounce {
      0%,100% { transform: translateY(0) rotate(-6deg); }
      50%      { transform: translateY(-22px) rotate(6deg); }
    }
    .splash-title {
      font-family: "Fredoka One", cursive; font-size: 4.2rem; color: white;
      text-align: center; line-height: 1.05; margin: 16px 0 10px;
      text-shadow: 0 4px 28px rgba(108,99,255,.9), 0 0 80px rgba(108,99,255,.4);
      animation: titlePop .7s cubic-bezier(.175,.885,.32,1.275) .2s both;
    }
    @keyframes titlePop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .splash-sub { color: rgba(255,255,255,.72); font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 36px; }
    .splash-btn {
      padding: 18px 54px; background: linear-gradient(135deg, #ffd166, #f4a261);
      border: none; border-radius: 99px; font-family: "Fredoka One", cursive;
      font-size: 1.65rem; color: #1a0533; cursor: pointer; letter-spacing: .5px;
      box-shadow: 0 8px 32px rgba(255,209,102,.5);
      animation: splashPulse 2.2s ease-in-out infinite; transition: transform .15s;
    }
    @keyframes splashPulse {
      0%,100% { box-shadow: 0 8px 32px rgba(255,209,102,.5), 0 0 0 0 rgba(255,209,102,.35); }
      55%      { box-shadow: 0 8px 32px rgba(255,209,102,.5), 0 0 0 14px rgba(255,209,102,0); }
    }
    .splash-btn:hover  { transform: scale(1.08); }
    .splash-btn:active { transform: scale(0.95); }

    .card {
      background: white; border-radius: 32px; padding: 36px 28px;
      max-width: 540px; width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.08);
      position: relative; z-index: 10;
    }
    h2 { font-family: "Fredoka One", cursive; font-size: 1.9rem; color: #1a0533; text-align: center; margin-bottom: 22px; }

    .alder-display { text-align: center; margin: 8px 0 4px; }
    .alder-tall {
      font-family: "Fredoka One", cursive; font-size: 6rem; line-height: 1;
      background: linear-gradient(135deg, #6c63ff, #ff6584);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 2px 10px rgba(108,99,255,.3));
    }
    .alder-aar { font-size: 1.2rem; color: #999; margin-top: 4px; font-weight: 800; }
    .slider-wrap { padding: 16px 4px 24px; }
    input[type=range] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 16px;
      border-radius: 99px; background: linear-gradient(90deg, #ff6584, #ffd166, #6c63ff, #06d6a0);
      outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 44px; height: 44px; border-radius: 50%;
      background: white; border: 4px solid #6c63ff;
      box-shadow: 0 4px 16px rgba(108,99,255,.35); cursor: pointer; transition: transform .1s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.16); }
    .slider-labels { display: flex; justify-content: space-between; font-size: .9rem; color: #ccc; padding: 0 4px; margin-top: 8px; font-weight: 800; }

    .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .theme-btn {
      padding: 20px 10px; border: none; border-radius: 20px;
      font-family: "Fredoka One", cursive; font-size: 1rem; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,.18); letter-spacing: .3px;
    }
    .theme-btn .emoji { font-size: 2.4rem; }
    .theme-btn:hover  { transform: translateY(-5px) scale(1.03); box-shadow: 0 14px 30px rgba(0,0,0,.22); }
    .theme-btn:active { transform: scale(0.96); }
    .theme-grid > .theme-btn:last-child:nth-child(odd) { grid-column: span 2; }

    .progress-wrap { background: #f0eeff; border-radius: 99px; height: 14px; margin-bottom: 20px; overflow: hidden; }
    .progress-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #6c63ff, #ff6584); transition: width .5s cubic-bezier(.4,0,.2,1); box-shadow: 0 0 12px rgba(108,99,255,.4); }
    .progress-label { font-size: .82rem; font-weight: 800; color: #bbb; text-align: right; margin-bottom: 6px; }

    .question-text { font-size: 1.22rem; font-weight: 900; color: #1a0533; text-align: center; margin-bottom: 24px; line-height: 1.5; min-height: 72px; padding: 0 4px; }

    .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .option-btn {
      padding: 18px 10px; border: 3px solid #ece9ff; border-radius: 18px;
      background: #faf9ff; font-family: "Nunito", sans-serif;
      font-size: 1rem; font-weight: 800; cursor: pointer;
      transition: all .15s; color: #1a0533; line-height: 1.3;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .option-btn:hover:not(:disabled) { background: #ece9ff; border-color: #6c63ff; transform: translateY(-3px); box-shadow: 0 8px 18px rgba(108,99,255,.2); }
    .option-btn.correct {
      background: #d4f8e8; border-color: #06d6a0; border-width: 4px; color: #025940;
      transform: scale(1.05); box-shadow: 0 0 0 4px rgba(6,214,160,.2), 0 8px 24px rgba(6,214,160,.3);
      animation: correctBounce .4s cubic-bezier(.175,.885,.32,1.275);
    }
    @keyframes correctBounce { 0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1.05); } }
    .option-btn.wrong { background: #ffe0e6; border-color: #ff6584; border-width: 4px; color: #8b1a2e; animation: wrongShake .4s ease; }
    @keyframes wrongShake {
      0%,100% { transform: translateX(0); } 20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); }
    }
    .option-btn:disabled { cursor: default; }

    .feedback { text-align: center; font-family: "Fredoka One", cursive; font-size: 1.4rem; margin-top: 16px; min-height: 36px; animation: feedbackIn .3s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes feedbackIn { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .feedback.right { color: #06d6a0; }
    .feedback.wrong { color: #ff6584; }

    .result-emoji { font-size: 5rem; text-align: center; margin-bottom: 8px; }
    .result-score { font-family: "Fredoka One", cursive; font-size: 3.5rem; background: linear-gradient(135deg, #6c63ff, #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; margin-bottom: 8px; }
    .result-stars { text-align: center; font-size: 2.4rem; margin-bottom: 12px; letter-spacing: 4px; }
    .result-msg { text-align: center; color: #777; font-size: 1.1rem; font-weight: 800; margin-bottom: 28px; }

    .confetti-piece { position: fixed; pointer-events: none; z-index: 999; animation: confettiFall ease-out forwards; }
    @keyframes confettiFall { 0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); } 100% { opacity: 0; transform: translateY(280px) rotate(680deg) scale(.2); } }

    .btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 18px; font-family: "Fredoka One", cursive; font-size: 1.15rem; cursor: pointer; transition: transform .15s, box-shadow .15s; margin-top: 10px; color: white; letter-spacing: .3px; }
    .btn-primary   { background: linear-gradient(135deg,#6c63ff,#a855f7); box-shadow: 0 6px 20px rgba(108,99,255,.35); }
    .btn-secondary { background: linear-gradient(135deg,#ff6584,#f4a261); box-shadow: 0 6px 20px rgba(255,101,132,.35); }
    .btn:hover  { transform: translateY(-2px) scale(1.02); }
    .btn:active { transform: scale(0.97); }

    .back-link { display: block; text-align: center; margin-top: 16px; color: #ccc; font-size: .9rem; font-weight: 800; cursor: pointer; background: none; border: none; }
    .back-link:hover { color: #999; }

    @keyframes starBounce { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-9px) scale(1.12); } }
    .star { display: inline-block; }
</style>
</head>

function startParticles() {
  const container = document.getElementById('particles');
  const emojis = ['\u2B50','\uD83C\uDF89','\uD83E\uDD84','\uD83C\uDF88','\uD83C\uDF08','\uD83C\uDF8A','\u2728','\uD83D\uDE80','\uD83E\uDEB8','\u26BD','\uD83D\uDCAB','\uD83C\uDFAF'];
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.cssText = `left:${Math.random()*100}%;font-size:${1+Math.random()*1.8}rem;animation-duration:${9+Math.random()*14}s;animation-delay:${-Math.random()*20}s`;
    container.appendChild(el);
  }
}

  }, 500);
}

  const rect = app.getBoundingClientRect();
  for (let i = 0; i < 42; i++) {
    const el = document.createElement('div');
    const size = 7 + Math.random() * 7;
    el.className = 'confetti-piece';
    el.style.cssText = `width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${rect.left+Math.random()*rect.width}px;top:${rect.top+rect.height*0.35}px;border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${.8+Math.random()*.9}s;animation-delay:${Math.random()*.25}s`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1800);
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
const app = document.getElementById('app');

function render() {
  if      (state.skjerm === 'alder')    renderAlder();
  else if (state.skjerm === 'tema')     renderTema();
  else if (state.skjerm === 'quiz')     renderQuiz();
  else if (state.skjerm === 'resultat') renderResultat();
}

function renderAlder() {
  const alder = state.alder || 5;
  const emojier = {2:'\uD83D\uDC76',3:'\uD83E\uDDD2',4:'\uD83E\uDDD2',5:'\uD83E\uDDD2',6:'\uD83E\uDDD1',7:'\uD83E\uDDD1'};
  app.innerHTML = `
    <h2>Hvor gammel er du?</h2>
    <div class="alder-display">
      <div class="alder-tall" id="alderTall">${alder}</div>
      <div class="alder-aar" id="alderAar">${emojier[alder]} \u00e5r</div>
    </div>
    <div class="slider-wrap">
      <input type="range" min="2" max="7" value="${alder}" id="alderSlider" oninput="oppdaterAlder(this.value)"/>
      <div class="slider-labels"><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span></div>
    </div>
    <button class="btn btn-primary" onclick="bekreftAlder()">Velg tema \u2192</button>
  `;
}

function oppdaterAlder(val) {
  const emojier = {2:'\uD83D\uDC76',3:'\uD83E\uDDD2',4:'\uD83E\uDDD2',5:'\uD83E\uDDD2',6:'\uD83E\uDDD1',7:'\uD83E\uDDD1'};
  const n = parseInt(val);
  document.getElementById('alderTall').textContent = n;
  document.getElementById('alderAar').textContent = emojier[n] + ' \u00e5r';
  state.alder = n;
}

function bekreftAlder() {
  if (!state.alder) state.alder = 5;
  state.skjerm = 'tema';
  render();
}

function renderTema() {
  let html = '<h2>Velg et tema!</h2><div class="theme-grid">';
  temaer.forEach(t => {
    html += `<button class="theme-btn" style="background:linear-gradient(135deg,${t.grad});color:${t.tekst}" onclick="velgTema('${t.id}')"><span class="emoji">${t.emoji}</span>${t.navn}</button>`;
  });
  html += `</div><button class="back-link" onclick="gaTilbakeTilAlder()">&larr; Endre alder (${state.alder} \u00e5r)</button>`;
  app.innerHTML = html;
}

function renderQuiz() {
  const sp = state.sporsmalListe[state.indeks];
  const antall = state.sporsmalListe.length;
  const fremgang = (state.indeks / antall) * 100;
  const tema = temaer.find(t => t.id === state.tema);
  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:1.5rem">${tema?.emoji||''}</span>
      <span class="progress-label">Sp\u00f8rsm\u00e5l ${state.indeks + 1} / ${antall}</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${fremgang}%"></div></div>
    <div class="question-text">${sp.q}</div>
    <div class="options-grid" id="alternativer">`;
  const blandede = [...sp.alt].sort(() => Math.random() - 0.5);
  blandede.forEach(alt => {
    html += `<button class="option-btn" onclick="velgSvar(this,'${escapeAttr(alt)}','${escapeAttr(sp.a)}')">${alt}</button>`;
  });
  html += `</div><div class="feedback" id="feedback"></div>`;
  app.innerHTML = html;
}

function renderResultat() {
  const antall = state.sporsmalListe.length;
  const prosent = Math.round((state.poeng / antall) * 100);
  let emoji, melding, nStjerner;
  if (prosent===100)   {emoji='\uD83C\uDFC6';melding='Perfekt! Du er en superstjerne!'; nStjerner=3;}
  else if(prosent>=80) {emoji='\uD83C\uDF1F';melding='Fantastisk! Nesten perfekt!';     nStjerner=3;}
  else if(prosent>=60) {emoji='\uD83D\uDE0A';melding='Bra jobbet! Du er flink!';        nStjerner=2;}
  else if(prosent>=40) {emoji='\uD83D\uDCAA';melding='Godt fors\u00f8kt! \u00d8v litt mer!'; nStjerner=1;}
  else                 {emoji='\uD83D\uDCDA';melding='Ikke gi opp! Pr\u00f8v igjen!';  nStjerner=1;}
  const starsHtml = [0,1,2].map(i =>
    `<span class="star" style="animation:starBounce .7s ease infinite ${i*.12}s">${i<nStjerner?'\u2B50':'\u2606'}</span>`
  ).join('');
  app.innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${state.poeng} / ${antall}</div>
    <div class="result-stars">${starsHtml}</div>
    <p class="result-msg">${melding}</p>
    <button class="btn btn-primary" onclick="spillSammeTema()">Spill igjen \u2013 samme tema</button>
    <button class="btn btn-secondary" onclick="velgNyttTema()">Velg nytt tema</button>
    <button class="back-link" onclick="gaTilbakeTilAlder()">&larr; Velg ny alder</button>`;
  if (prosent >= 60) setTimeout(fireConfetti, 400);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function escapeAttr(s) { return s.replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
function bland(arr)    { return [...arr].sort(() => Math.random() - 0.5); }

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function velgTema(id) {
  state.tema = id; state.indeks = 0; state.poeng = 0; state.svart = false;
  state.sporsmalListe = bland(sporsmal[id][alderTilNiv\u00e5(state.alder)]);
  state.skjerm = 'quiz'; render();
}

function velgSvar(knapp, valgt, riktig) {
  if (state.svart) return;
  state.svart = true;
  const alle = document.querySelectorAll('.option-btn');
  alle.forEach(k => { k.disabled = true; if (k.textContent.trim() === riktig) k.classList.add('correct'); });
  const feedback = document.getElementById('feedback');
  let ventetid;
  if (valgt === riktig) {
    state.poeng++; knapp.classList.add('correct');
    feedback.textContent = 'Riktig'; feedback.className = 'feedback right';
    ventetid = 1200; fireConfetti();
  } else {
    knapp.classList.add('wrong');
    feedback.innerHTML = `Riktig svar: <strong>${riktig}</strong>`;
    feedback.className = 'feedback wrong'; ventetid = 4500;
  }
  setTimeout(() => {
    state.indeks++; state.svart = false;
    if (state.indeks >= state.sporsmalListe.length) state.skjerm = 'resultat';
    render();
  }, ventetid);
}

function spillSammeTema()  { velgTema(state.tema); }
function velgNyttTema()    { state.skjerm = 'tema'; render(); }
function gaTilbakeTilAlder() { state.skjerm = 'alder'; render(); }

// ─── START ────────────────────────────────────────────────────────────────────
startParticles();

</script>
</body>
</html>
